<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="styles.css" />
  <title>Dashboard • VocabForge</title>
</head>
<body>
  <!-- FX layers MUST NOT push layout (fixed via CSS) -->
  <canvas id="vfFxCanvas" class="vfFxCanvas"></canvas>
  <div id="vfAnimalLayer" class="vfAnimalLayer"></div>

  <div class="container" style="max-width:980px;width:100%;margin:0 auto;">
    <div class="row space" style="margin-top:10px;">
      <div>
        <h1>Dashboard</h1>
        <div class="small" id="topStats">Loading...</div>
      </div>

      <div class="row" style="gap:8px;flex-wrap:wrap;">
        <div class="pill" id="dashStreakPill"> </div>
        <button class="btn secondary" id="openReview">Review</button>
        <button class="btn secondary" id="refreshBtn">⟳ Refresh</button>

        <label class="row" style="gap:8px; align-items:center; padding:8px 10px; border:1px solid var(--border); border-radius:14px; background:rgba(255,255,255,.03);">
          <input type="checkbox" id="fxToggle" checked />
          <span class="mini">FX</span>
          <select id="fxMode" style="padding:6px 8px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--text);">
            <option value="snow" selected>Snow</option>
            <option value="leaves">Leaves</option>
          </select>
        </label>

        <button class="btn" id="exportBtn">Export</button>
        <button class="btn" id="importBtn">Import</button>
      </div>
    </div>
    <div id="dashStreakBar" class="vfStreakBar" style="justify-content:flex-end;"></div>

    <div style="height:12px;"></div>

    <div class="card">
      <div class="row" style="gap:10px;flex-wrap:wrap;">
        <input id="search" placeholder="Search word / meaning / tag..." style="flex:1;min-width:220px;">
        <input id="tag" placeholder="Filter tag (e.g. TOEIC)" style="width:220px;">
        <button class="btn secondary" id="applyFilter">Apply</button>
      </div>

      <div style="height:10px;"></div>

      <div class="row" style="gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="small">Quick tags:</div>
        <div id="tagChips" class="chipRow"></div>
      </div>

      <div style="height:10px;"></div>
      <div class="small" id="countText">—</div>
      <div style="height:10px;"></div>
      <div id="heatmap"></div>
    </div>

    <div style="height:12px;"></div>

    <div class="card">
      <h2>Words</h2>
      <div class="list" id="list"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="vfDashEditOverlay" class="vfOverlay" style="display:none;">
    <div class="vfModal">
      <div class="vfModalHead">
        <div>Edit word</div>
        <button id="vfDashEditClose" class="btn ghost" style="padding:8px 10px;">✕</button>
      </div>

      <div class="vfModalBody">
        <div class="small">Word</div>
        <input id="vfDashEditWord" />

        <div style="height:8px;"></div>
        <div class="small">Meaning (VI)</div>
        <textarea id="vfDashEditMeaning" rows="3"></textarea>

        <div style="height:8px;"></div>
        <div class="small">Example</div>
        <textarea id="vfDashEditExample" rows="3"></textarea>

        <div style="height:8px;"></div>
        <div class="small">Tags (comma)</div>
        <input id="vfDashEditTags" placeholder="TOEIC, Programming..." />

        <div style="height:8px;"></div>
        <div class="small">Note</div>
        <textarea id="vfDashEditNote" rows="3"></textarea>

        <div class="row" style="gap:8px;margin-top:10px;">
          <button id="vfDashEditSave" class="btn secondary" style="flex:1;">Save</button>
          <button id="vfDashEditDelete" class="btn danger" style="flex:1;">Delete</button>
        </div>
      </div>
    </div>
  </div>
  <script src="vf_logger.js"></script>
  <script src="vf_rpc.js"></script>
  <script src="vf_tts.js"></script>
  <script src="vf_ui.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
